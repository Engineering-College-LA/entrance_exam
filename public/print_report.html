<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отчёт — E|C Engineering College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="html2pdf.bundle.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f3f9;
      color: #1a2535;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    svg {
      overflow: visible !important;
      background: transparent !important;
    }

    /* ── Layout ── */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0b1f3a 0%, #122848 100%);
      border-radius: 10px 10px 0 0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo img {
      height: 44px;
      width: auto;
    }

    .header-logo-text {
      font-weight: 600;
      font-size: 14px;
      color: #b0bcd0;
      letter-spacing: 0.5px;
    }

    .header-badge {
      font-family: monospace;
      font-size: 11px;
      background: rgba(255, 255, 255, .08);
      color: #8fa3c0;
      padding: 4px 12px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .1);
    }

    .header-date {
      font-size: 11px;
      color: #6a85a8;
      margin-top: 3px;
      text-align: right;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #0b1f3a 0%, #0a2240 100%);
      padding: 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
    }

    .hero-glow {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(27, 140, 94, .14) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .hero-title {
      font-weight: 800;
      font-size: 26px;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .hero-sub {
      color: #8fa3c0;
      font-size: 14px;
    }

    .hero-name {
      color: #e8a020;
      font-weight: 600;
    }

    .ring-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0 10px;
    }

    .ring-inner {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .ring-inner svg {
      transform: rotate(-90deg);
      overflow: visible;
      background: transparent;
      display: block;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ring-pct {
      font-weight: 800;
      font-size: 22px;
      color: #ffffff;
      line-height: 1;
    }

    .ring-txt {
      font-size: 10px;
      color: #8fa3c0;
      margin-top: 2px;
    }

    .grade-badge {
      display: inline-block;
      border-radius: 3px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── Student info strip ── */
    .student-strip {
      background: #122848;
      padding: 10px 40px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .student-field {
      font-size: 12px;
      color: #8fa3c0;
    }

    .student-field span {
      color: #ffffff;
      font-weight: 600;
      margin-left: 6px;
    }

    /* ── Stats grid ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .stat-box {
      background: #ffffff;
      border: 1px solid #dde3ed;
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
    }

    .stat-val {
      font-weight: 800;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: #6b7a95;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Topics ── */
    .topics {
      background: #ffffff;
      border: 1px solid #dde3ed;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
    }

    .topics-header {
      padding: 10px 18px;
      background: #f7f9fc;
      border-bottom: 1px solid #dde3ed;
      font-weight: 700;
      font-size: 13px;
      color: #0b1f3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topics-header span {
      font-size: 11px;
      font-weight: 400;
      color: #6b7a95;
    }

    .topic-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid #dde3ed;
    }

    .topic-row:last-child {
      border-bottom: none;
    }

    .topic-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    .topic-bar-wrap {
      flex: 2;
      height: 8px;
      background: #dde3ed;
      border-radius: 4px;
      overflow: hidden;
    }

    .topic-bar {
      height: 100%;
      border-radius: 4px;
    }

    .topic-pct {
      font-family: monospace;
      font-size: 11px;
      color: #6b7a95;
      min-width: 36px;
      text-align: right;
    }

    /* ── Footer ── */
    .footer {
      background: linear-gradient(135deg, #0b1f3a 0%, #122848 100%);
      border-radius: 0 0 10px 10px;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-left {
      font-size: 12px;
      color: #6a85a8;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .footer-links a {
      color: #8fa3c0;
      text-decoration: none;
    }

    /* ── Print overrides ── */
    @media print {
      body {
        background: #ffffff;
      }

      .page {
        padding: 0;
        max-width: 100%;
      }

      .no-print {
        display: none !important;
      }

      .header {
        border-radius: 0;
      }

      .footer {
        border-radius: 0;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="report"></div>
  </div>

  <script>
    const COLORS = {
      success: "#1b8c5e",
      danger: "#c0392b",
      blue: "#1565c0",
      navy: "#0b1f3a",
      accent: "#e8a020",
    };

    function topicColor(pct) {
      if (pct >= 70) return COLORS.success;
      if (pct >= 50) return COLORS.accent;
      return COLORS.danger;
    }

    function gradeInfo(pct) {
      if (pct >= 80) return { label: { ru: "Отлично", en: "Excellent" }, color: COLORS.success };
      if (pct >= 65) return { label: { ru: "Хорошо", en: "Good" }, color: "#1976d2" };
      if (pct >= 50) return { label: { ru: "Удовлетворительно", en: "Satisfactory" }, color: COLORS.accent };
      return { label: { ru: "Требует улучшения", en: "Needs Improvement" }, color: COLORS.danger };
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function buildReport(data) {
      const { student, result, topics, lang } = data;
      const isRu = lang === "ru";
      const pct = Math.round((result.correct / result.total) * 100);
      const mm = pad(Math.floor(result.elapsed / 60));
      const ss = pad(result.elapsed % 60);
      const grade = gradeInfo(pct);
      const gradeLabel = grade.label[lang] || grade.label.ru;
      const gradeColor = grade.color;

      // SVG ring
      const R = 38, C = 2 * Math.PI * R;
      const offset = C - (pct / 100) * C;

      const now = new Date();
      const dateStr = now.toLocaleDateString(isRu ? "ru-RU" : "en-US", { day: "2-digit", month: "long", year: "numeric" });
      const timeStr = now.toLocaleTimeString(isRu ? "ru-RU" : "en-US", { hour: "2-digit", minute: "2-digit" });

      const T = {
        completed: isRu ? "Пробный Экзамен завершён!" : "Trial Test Completed!",
        desc: isRu ? "Отчёт о результатах," : "Performance report,",
        score: isRu ? "Результат" : "Score",
        correct: isRu ? "Правильно" : "Correct",
        incorrect: isRu ? "Неверно" : "Incorrect",
        total: isRu ? "Всего" : "Total",
        timeused: isRu ? "Время" : "Time Used",
        topics: isRu ? "Результаты по темам" : "Performance by Topic",
        estimated: isRu ? "Разбивка" : "Breakdown",
        generated: isRu ? `Сформировано ${dateStr} в ${timeStr}` : `Generated ${dateStr} at ${timeStr}`,
        grade: isRu ? "Класс" : "Grade",
        phone: isRu ? "Телефон" : "Phone",
        badge: isRu ? "Пробный Экзамен" : "Trial Test",
        footer: isRu ? "E|C Engineering College — college.edu.kg" : "E|C Engineering College — college.edu.kg",
      };

      const topicsHTML = topics.map(tp => `
      <div class="topic-row">
        <div class="topic-name">${tp.name}</div>
        <div class="topic-bar-wrap">
          <div class="topic-bar" style="width:${tp.pct}%;background:${topicColor(tp.pct)}"></div>
        </div>
        <div class="topic-pct">${tp.pct}%</div>
      </div>`).join("");

      return `
      <div class="header">
        <div class="header-logo">
          <img src="assets/app_logo.png" alt="E|C" onerror="this.style.display='none'" />
          <div>
            <div class="header-logo-text">Engineering College</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="header-badge">${T.badge}</div>
          <div class="header-date">${T.generated}</div>
        </div>
      </div>

      <div class="hero">
        <div class="hero-glow"></div>
        <h2 class="hero-title">${T.completed}</h2>
        <p class="hero-sub">${T.desc} <span class="hero-name">${student.firstName} ${student.lastName}</span></p>
        <div class="ring-wrap">
          <div class="ring-inner">
            <svg width="90" height="90">
              <circle cx="45" cy="45" r="${R}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="7"/>
              <circle cx="45" cy="45" r="${R}" fill="none" stroke="${gradeColor}" stroke-width="7"
                stroke-linecap="round"
                stroke-dasharray="${C.toFixed(2)}"
                stroke-dashoffset="${offset.toFixed(2)}"/>
            </svg>
            <div class="ring-label">
              <div class="ring-pct">${pct}%</div>
              <div class="ring-txt">${T.score}</div>
            </div>
          </div>
        </div>
        <div class="grade-badge" style="background:${gradeColor}22;color:${gradeColor};border:1px solid ${gradeColor}44">${gradeLabel}</div>
      </div>

      <div class="student-strip">
        <div class="student-field">${T.grade}:<span>${student.grade}</span></div>
        <div class="student-field">${T.phone}:<span>${student.phone}</span></div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.success}">${result.correct}</div>
          <div class="stat-label">${T.correct}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.danger}">${result.total - result.correct}</div>
          <div class="stat-label">${T.incorrect}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.navy}">${result.total}</div>
          <div class="stat-label">${T.total}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.blue}">${mm}:${ss}</div>
          <div class="stat-label">${T.timeused}</div>
        </div>
      </div>

      <div class="topics">
        <div class="topics-header">
          <span>${T.topics}</span>
          <span>${T.estimated}</span>
        </div>
        ${topicsHTML}
      </div>

      <div class="footer">
        <div class="footer-left">${T.footer}</div>
        <div class="footer-links">
          <a href="https://college.edu.kg/">college.edu.kg</a>
          <a href="https://www.instagram.com/engineering.college.la/">Instagram</a>
        </div>
      </div>
    `;
    }

    const isDownloadMode = new URLSearchParams(window.location.search).get("download") === "1";

    function showOverlay(msg) {
      const ov = document.createElement("div");
      ov.id = "dl-overlay";
      ov.style.cssText = "position:fixed;inset:0;background:rgba(11,31,58,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;font-family:Inter,sans-serif;gap:16px";
      ov.innerHTML = "<div style='width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite'></div><div style='font-size:15px;font-weight:600'>" + msg + "</div>";
      const style = document.createElement("style");
      style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
      document.head.appendChild(style);
      document.body.appendChild(ov);
    }

    function hideOverlay() {
      const ov = document.getElementById("dl-overlay");
      if (ov) ov.remove();
    }

    async function downloadAsPDF(student) {
      const isRu = document.documentElement.lang === "ru";
      showOverlay(isRu ? "Создание PDF…" : "Generating PDF…");
      await document.fonts.ready;
      const el = document.querySelector(".page");
      const name = (student.firstName + "_" + student.lastName).replace(/\s+/g, "_");
      try {
        await html2pdf()
          .set({
            margin: 0,
            filename: "EC_Report_" + name + ".pdf",
            image: { type: "jpeg", quality: 0.97 },
            html2canvas: {
              scale: 2,
              useCORS: true,
              allowTaint: true,
              backgroundColor: "#f0f3f9",
              logging: false,
            },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          })
          .from(el)
          .save();
      } finally {
        hideOverlay();
      }
    }

    try {
      const raw = sessionStorage.getItem("ec_print_report");
      if (!raw) {
        document.getElementById("report").innerHTML = "<p style='padding:40px;text-align:center;color:#c0392b'>No report data found. Please go back and click Download again.</p>";
      } else {
        const data = JSON.parse(raw);
        document.getElementById("report").innerHTML = buildReport(data);
        document.documentElement.lang = data.lang || "ru";
        if (isDownloadMode) {
          setTimeout(() => downloadAsPDF(data.student), 800);
        } else {
          setTimeout(() => window.print(), 600);
        }
      }
    } catch (e) {
      document.getElementById("report").innerHTML = "<p style='padding:40px;text-align:center;color:#c0392b'>Error loading report data.</p>";
    }
  </script>
</body>

</html>
