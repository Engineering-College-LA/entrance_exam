<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отчёт — E|C Engineering College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="html2pdf.bundle.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f3f9;
      color: #1a2535;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    svg {
      overflow: visible !important;
      background: transparent !important;
    }

    /* ── Layout ── */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0b1f3a 0%, #122848 100%);
      border-radius: 10px 10px 0 0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo img {
      height: 44px;
      width: auto;
    }

    .header-logo-text {
      font-weight: 600;
      font-size: 14px;
      color: #b0bcd0;
      letter-spacing: 0.5px;
    }

    .header-badge {
      font-family: monospace;
      font-size: 11px;
      background: rgba(255, 255, 255, .08);
      color: #8fa3c0;
      padding: 4px 12px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .1);
    }

    .header-date {
      font-size: 11px;
      color: #6a85a8;
      margin-top: 3px;
      text-align: right;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #0b1f3a 0%, #0a2240 100%);
      padding: 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
    }

    .hero-glow {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(27, 140, 94, .14) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .hero-title {
      font-weight: 800;
      font-size: 26px;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .hero-sub {
      color: #8fa3c0;
      font-size: 14px;
    }

    .hero-name {
      color: #e8a020;
      font-weight: 600;
    }

    .ring-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0 10px;
    }

    .ring-inner {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .ring-inner svg {
      transform: rotate(-90deg);
      overflow: visible;
      background: transparent;
      display: block;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ring-pct {
      font-weight: 800;
      font-size: 22px;
      color: #ffffff;
      line-height: 1;
    }

    .ring-txt {
      font-size: 10px;
      color: #8fa3c0;
      margin-top: 2px;
    }

    .grade-badge {
      display: inline-block;
      border-radius: 3px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── Student / parent info strips ── */
    .student-strip {
      background: #122848;
      padding: 4px 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .parent-strip {
      background: #0d2444;
      padding: 4px 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .student-field {
      font-size: 12px;
      color: #8fa3c0;
    }

    .student-field span {
      color: #ffffff;
      font-weight: 600;
      margin-left: 6px;
    }

    .parent-label {
      font-size: 10px;
      font-weight: 700;
      color: #3d5a7a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      align-self: center;
      white-space: nowrap;
    }

    .attended-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      margin-left: 6px;
    }

    /* ── Stats grid ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin: 5px 0;
    }

    .stat-box {
      background: #ffffff;
      border: 1px solid #dde3ed;
      border-radius: 6px;
      padding: 5px 8px;
      text-align: center;
      box-shadow: none;
    }

    .stat-val {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 1px;
    }

    .stat-label {
      font-size: 10px;
      color: #6b7a95;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Topics ── */
    .topics {
      background: #ffffff;
      border: 1px solid #dde3ed;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 5px;
      box-shadow: none;
    }

    .topics-header {
      padding: 4px 14px;
      background: #f7f9fc;
      border-bottom: 1px solid #dde3ed;
      font-weight: 700;
      font-size: 12px;
      color: #0b1f3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topics-header span {
      font-size: 10px;
      font-weight: 400;
      color: #6b7a95;
    }

    .topic-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 3px 14px;
      border-bottom: 1px solid #dde3ed;
    }

    .topic-row:last-child {
      border-bottom: none;
    }

    .topic-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
    }

    .topic-bar-wrap {
      flex: 2;
      height: 6px;
      background: #dde3ed;
      border-radius: 3px;
      overflow: hidden;
    }

    .topic-bar {
      height: 100%;
      border-radius: 4px;
    }

    .topic-pct {
      font-family: monospace;
      font-size: 11px;
      color: #6b7a95;
      min-width: 36px;
      text-align: right;
    }

    /* ── Footer ── */
    .footer {
      background: linear-gradient(135deg, #0b1f3a 0%, #122848 100%);
      border-radius: 0 0 10px 10px;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-left {
      font-size: 12px;
      color: #6a85a8;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .footer-links a {
      color: #8fa3c0;
      text-decoration: none;
    }

    /* ── Print overrides ── */
    @media print {
      body {
        background: #ffffff;
      }

      .page {
        padding: 0;
        max-width: 100%;
      }

      .no-print {
        display: none !important;
      }

      .header {
        border-radius: 0;
      }

      .footer {
        border-radius: 0;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="report"></div>
  </div>

  <script>
    const COLORS = {
      success: "#1b8c5e",
      danger: "#c0392b",
      blue: "#1565c0",
      navy: "#0b1f3a",
      accent: "#e8a020",
    };

    // Russian topic name lookup — matches both translation keys and English names
    const TOPIC_RU = {
      // by key
      "topic.fractions":      "Дроби",
      "topic.linearEquations":"Линейные уравнения",
      "topic.geometry":       "Геометрия",
      "topic.identities":     "Алг. тождества",
      "topic.orderOfOps":     "Порядок действий",
      "topic.decimals":       "Десятичные дроби",
      "topic.powers":         "Степени",
      "topic.roots":          "Квадратные корни",
      "topic.percentages":    "Проценты",
      "topic.sequences":      "Последовательности",
      "topic.wordProblems":   "Задачи",
      "topic.ratios":         "Пропорции",
      "topic.logic":          "Логика",
      "topic.functions":      "Функции",
      "topic.algebra":        "Алгебра",
      "topic.calculus":       "Мат. Анализ",
      "topic.statistics":     "Статистика",
      "topic.numberTheory":   "Теория чисел",
      // by English name (fallback for records saved in English)
      "Fractions":            "Дроби",
      "Linear Equations":     "Линейные уравнения",
      "Geometry":             "Геометрия",
      "Algebraic Identities": "Алг. тождества",
      "Alg. тождества":       "Алг. тождества",
      "Order of Operations":  "Порядок действий",
      "Decimals":             "Десятичные дроби",
      "Powers":               "Степени",
      "Square Roots":         "Квадратные корни",
      "Percentages":          "Проценты",
      "Sequences":            "Последовательности",
      "Word Problems":        "Задачи",
      "Ratios & Proportions": "Пропорции",
      "Logic":                "Логика",
      "Functions":            "Функции",
      "Algebra":              "Алгебра",
      "Calculus":             "Мат. Анализ",
      "Statistics":           "Статистика",
      "Number Theory":        "Теория чисел",
    };

    function topicRu(tp) {
      return TOPIC_RU[tp.key] || TOPIC_RU[tp.name] || tp.name;
    }

    function topicColor(pct) {
      if (pct >= 70) return COLORS.success;
      if (pct >= 50) return COLORS.accent;
      return COLORS.danger;
    }

    function gradeInfo(pct) {
      if (pct >= 80) return { label: "Отлично",              color: COLORS.success };
      if (pct >= 65) return { label: "Хорошо",               color: "#1976d2" };
      if (pct >= 50) return { label: "Удовлетворительно",    color: COLORS.accent };
      return          { label: "Требует улучшения",           color: COLORS.danger };
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function buildReport(data) {
      const { student, result, topics, lang, examType } = data;
      const isRu = lang === "ru";
      const isPlacement = examType === "placement";
      const pct = Math.round((result.correct / result.total) * 100);
      const mm = pad(Math.floor(result.elapsed / 60));
      const ss = pad(result.elapsed % 60);
      const grade = gradeInfo(pct);
      const gradeLabel = grade.label;
      const gradeColor = grade.color;

      // SVG ring
      const R = 38, C = 2 * Math.PI * R;
      const offset = C - (pct / 100) * C;

      const now = new Date();
      const dateStr = now.toLocaleDateString("ru-RU", { day: "2-digit", month: "long", year: "numeric" });
      const timeStr = now.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });

      const T = {
        completed: isPlacement ? "Вступительный Экзамен завершён!" : "Пробный Экзамен завершён!",
        desc: "Отчёт о результатах,",
        score: "Результат",
        correct: "Правильно",
        incorrect: "Неверно",
        total: "Всего",
        timeused: "Время",
        topics: "Результаты по темам",
        estimated: "Разбивка",
        generated: `Сформировано ${dateStr} в ${timeStr}`,
        grade: "Класс",
        phone: "Телефон",
        badge: isPlacement ? "Вступительный Экзамен" : "Пробный Экзамен",
        footer: "E|C Engineering College — college.edu.kg",
        parentSection: "Родитель / Опекун",
        parentName: "ФИО родителя",
        parentPhone: "Тел. родителя",
        attended: "Присутствие",
        attendedYes: "Пришёл",
        attendedNo: "Не пришёл",
      };

      const topicsHTML = topics.map(tp => `
      <div class="topic-row">
        <div class="topic-name">${topicRu(tp)}</div>
        <div class="topic-bar-wrap">
          <div class="topic-bar" style="width:${tp.pct}%;background:${topicColor(tp.pct)}"></div>
        </div>
        <div class="topic-pct">${tp.pct}%</div>
      </div>`).join("");

      return `
      <div class="header">
        <div class="header-logo">
          <img src="assets/app_logo.png" alt="E|C" onerror="this.style.display='none'" />
          <div>
            <div class="header-logo-text">Engineering College</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="header-badge">${T.badge}</div>
          <div class="header-date">${T.generated}</div>
        </div>
      </div>

      <div class="hero">
        <div class="hero-glow"></div>
        <h2 class="hero-title">${T.completed}</h2>
        <p class="hero-sub">${T.desc} <span class="hero-name">${student.firstName} ${student.lastName}</span></p>
        <div class="ring-wrap">
          <div class="ring-inner">
            <svg width="90" height="90">
              <circle cx="45" cy="45" r="${R}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="7"/>
              <circle cx="45" cy="45" r="${R}" fill="none" stroke="${gradeColor}" stroke-width="7"
                stroke-linecap="round"
                stroke-dasharray="${C.toFixed(2)}"
                stroke-dashoffset="${offset.toFixed(2)}"/>
            </svg>
            <div class="ring-label">
              <div class="ring-pct">${pct}%</div>
              <div class="ring-txt">${T.score}</div>
            </div>
          </div>
        </div>
        <div class="grade-badge" style="background:${gradeColor}22;color:${gradeColor};border:1px solid ${gradeColor}44">${gradeLabel}</div>
      </div>

      <div class="student-strip">
        <div class="student-field">${T.grade}:<span>${student.grade}</span></div>
        <div class="student-field">${T.phone}:<span>${student.phone}</span></div>
      </div>
      ${isPlacement ? `
      <div class="parent-strip">
        <div class="parent-label">${T.parentSection}</div>
        <div class="student-field">${T.parentName}:<span>${student.parentName || "—"}</span></div>
        <div class="student-field">${T.parentPhone}:<span>${student.parentPhone || "—"}</span></div>
        <div class="student-field">${T.attended}:<span class="attended-badge" style="background:${student.attended === 'attended' ? '#1b8c5e22' : '#c0392b22'};color:${student.attended === 'attended' ? '#1b8c5e' : '#c0392b'};border:1px solid ${student.attended === 'attended' ? '#1b8c5e44' : '#c0392b44'}">${student.attended === 'attended' ? T.attendedYes : student.attended === 'not_attended' ? T.attendedNo : '—'}</span></div>
      </div>` : ""}

      <div class="stats">
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.success}">${result.correct}</div>
          <div class="stat-label">${T.correct}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.danger}">${result.total - result.correct}</div>
          <div class="stat-label">${T.incorrect}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.navy}">${result.total}</div>
          <div class="stat-label">${T.total}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${COLORS.blue}">${mm}:${ss}</div>
          <div class="stat-label">${T.timeused}</div>
        </div>
      </div>

      <div class="topics">
        <div class="topics-header">
          <span>${T.topics}</span>
          <span>${T.estimated}</span>
        </div>
        ${topicsHTML}
      </div>

      <div class="footer">
        <div class="footer-left">${T.footer}</div>
        <div class="footer-links">
          <a href="https://college.edu.kg/">college.edu.kg</a>
          <a href="https://www.instagram.com/engineering.college.la/">Instagram</a>
        </div>
      </div>
    `;
    }

    const SUPABASE_URL = "https://jeipvqyetmcqsxvliwpp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xLw_44i9tOTEfWTGcDQ41Q_DLWbaC1o";

    const params = new URLSearchParams(window.location.search);
    const recordId    = params.get("id");
    const isDownloadMode = params.get("download") === "1";

    function showOverlay(msg) {
      const ov = document.createElement("div");
      ov.id = "dl-overlay";
      ov.style.cssText = "position:fixed;inset:0;background:rgba(11,31,58,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;font-family:Inter,sans-serif;gap:16px";
      ov.innerHTML = "<div style='width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite'></div><div style='font-size:15px;font-weight:600'>" + msg + "</div>";
      const style = document.createElement("style");
      style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
      document.head.appendChild(style);
      document.body.appendChild(ov);
    }

    function hideOverlay() {
      const ov = document.getElementById("dl-overlay");
      if (ov) ov.remove();
    }

    async function downloadAsPDF(student) {
      showOverlay("Создание PDF…");
      await document.fonts.ready;
      const el = document.querySelector(".page");
      const name = (student.firstName + "_" + student.lastName).replace(/\s+/g, "_");
      try {
        await html2pdf()
          .set({
            margin: 0,
            filename: "EC_Report_" + name + ".pdf",
            image: { type: "jpeg", quality: 0.97 },
            html2canvas: {
              scale: 2,
              useCORS: true,
              allowTaint: true,
              backgroundColor: "#f0f3f9",
              logging: false,
            },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          })
          .from(el)
          .save();
      } finally {
        hideOverlay();
      }
    }

    // Convert a Supabase row into the printData format
    function rowToPrintData(r) {
      const topics = Array.isArray(r.topics) ? r.topics : [];
      return {
        examType: r.exam_type || "trial",
        lang:     r.lang      || "ru",
        student: {
          firstName:   r.first_name   || "",
          lastName:    r.last_name    || "",
          phone:       r.phone        || "",
          grade:       r.grade        || "",
          parentName:  r.parent_name  || "",
          parentPhone: r.parent_phone || "",
          attended:    r.attended     || "",
        },
        result: {
          correct: r.correct ?? 0,
          total:   r.total   ?? 0,
          elapsed: r.elapsed ?? 0,
          answers: {},
        },
        topics: topics.map(tp => ({ key: tp.key, name: tp.key, pct: tp.pct })),
      };
    }

    function renderData(data) {
      document.getElementById("report").innerHTML = buildReport(data);
      document.documentElement.lang = data.lang || "ru";
      if (isDownloadMode) {
        setTimeout(() => downloadAsPDF(data.student), 800);
      } else {
        setTimeout(() => window.print(), 600);
      }
    }

    function showError(msg) {
      document.getElementById("report").innerHTML =
        "<p style='padding:40px;text-align:center;color:#c0392b'>" + msg + "</p>";
    }

    async function loadFromSupabase(id) {
      showOverlay("Загрузка данных…");
      try {
        const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await sb
          .from("applicants")
          .select("id, first_name, last_name, phone, grade, exam_type, score, correct, total, elapsed, lang, completed_at, topics, parent_name, parent_phone, attended")
          .eq("id", id)
          .single();
        hideOverlay();
        if (error || !data) {
          showError("Запись не найдена в базе данных.");
          return;
        }
        renderData(rowToPrintData(data));
      } catch (e) {
        hideOverlay();
        showError("Ошибка загрузки данных: " + e.message);
      }
    }

    // Entry point: prefer Supabase fetch (via ?id=), fall back to sessionStorage
    if (recordId) {
      loadFromSupabase(recordId);
    } else {
      try {
        const raw = sessionStorage.getItem("ec_print_report");
        if (!raw) {
          showError("Данные отчёта не найдены. Вернитесь назад и нажмите «Печать» снова.");
        } else {
          renderData(JSON.parse(raw));
        }
      } catch (e) {
        showError("Ошибка загрузки данных отчёта.");
      }
    }
  </script>
</body>

</html>
