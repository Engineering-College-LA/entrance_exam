<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — E|C Engineering College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../../assets/app_logo.png" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b1f3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-row img { height: 38px; width: auto; }
    .logo-row-text { font-size: 13px; font-weight: 600; color: #0b1f3a; line-height: 1.3; }
    .logo-row-sub { font-size: 11px; color: #6b7a95; font-weight: 400; }
    h1 { font-size: 20px; font-weight: 800; color: #0b1f3a; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7a95; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #0b1f3a; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1.5px solid #dde3ed;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      color: #1a2535;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #1565c0; }
    input.error { border-color: #c0392b; }
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: -14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .btn {
      width: 100%;
      background: #0b1f3a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #122848; }
    .btn:active { background: #0a1a30; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #6b7a95;
      text-decoration: none;
    }
    .back-link:hover { color: #0b1f3a; }
    .divider { height: 1px; background: #dde3ed; margin: 24px 0; }
    .lang-switch { display: flex; gap: 4px; align-items: center; }
    .lang-btn { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; border: 1px solid #dde3ed; background: #ffffff; color: #6b7a95; cursor: pointer; font-family: monospace; transition: all .15s; text-align: center; line-height: 1; }
    .lang-btn:hover { background: #f0f3f9; color: #0b1f3a; }
    .lang-btn.active { background: #0b1f3a; color: #ffffff; border-color: #0b1f3a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row" style="justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <img src="../../assets/app_logo.png" alt="E|C" onerror="this.style.display='none'" />
        <div>
          <div class="logo-row-text">Engineering College</div>
          <div class="logo-row-sub" id="lbl-admin-portal">Admin Portal</div>
        </div>
      </div>
      <div class="lang-switch">
        <button class="lang-btn" id="lang-btn-ru" onclick="setLoginLang('ru')">RU</button>
        <button class="lang-btn" id="lang-btn-en" onclick="setLoginLang('en')">EN</button>
      </div>
    </div>
    <div class="divider"></div>
    <h1 id="lbl-sign-in">Sign In</h1>
    <p class="subtitle" id="lbl-subtitle">Access the admin dashboard</p>

    <label for="username" id="lbl-username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" />

    <label for="password" id="lbl-password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    <div class="error-msg" id="error-msg">Incorrect username or password.</div>

    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
    <a class="back-link" href="../../index.html" id="lbl-back">← Back to Trial Test</a>
  </div>

  <script>
    // Redirect if already authenticated
    if (sessionStorage.getItem("ec_admin_auth") === "1") {
      window.location.replace("dashboard.html");
    }

    const ADMIN_USER = "admin";
    const ADMIN_PASS = "EC@2025";
    const STAFF_USER = "staff";
    const STAFF_PASS = "Staff_EC@2025";

    // ── Localization ────────────────────────────────────────────────────────────
    const LOGIN_STRINGS = {
      en: {
        adminPortal:     "Admin Portal",
        signIn:          "Sign In",
        subtitle:        "Access the admin dashboard",
        username:        "Username",
        password:        "Password",
        btnSignIn:       "Sign In",
        backLink:        "← Back to Trial Test",
        errInvalid:      "Incorrect username or password.",
        errBothRequired: "Please enter both username and password.",
        pageTitle:       "Admin Login — E|C Engineering College",
        userPlaceholder: "Enter username",
        passPlaceholder: "Enter password",
      },
      ru: {
        adminPortal:     "Панель администратора",
        signIn:          "Вход",
        subtitle:        "Доступ к панели администратора",
        username:        "Имя пользователя",
        password:        "Пароль",
        btnSignIn:       "Войти",
        backLink:        "← Назад к пробному экзамену",
        errInvalid:      "Неверное имя пользователя или пароль.",
        errBothRequired: "Введите имя пользователя и пароль.",
        pageTitle:       "Вход — E|C Engineering College",
        userPlaceholder: "Введите логин",
        passPlaceholder: "Введите пароль",
      },
    };

    const loginLang = localStorage.getItem("ec_admin_lang") || "ru";
    const S = LOGIN_STRINGS[loginLang] || LOGIN_STRINGS.en;

    document.documentElement.lang                                  = loginLang;
    document.title                                                 = S.pageTitle;
    document.getElementById("lbl-admin-portal").textContent        = S.adminPortal;
    document.getElementById("lbl-sign-in").textContent             = S.signIn;
    document.getElementById("lbl-subtitle").textContent            = S.subtitle;
    document.getElementById("lbl-username").textContent            = S.username;
    document.getElementById("lbl-password").textContent            = S.password;
    document.getElementById("login-btn").textContent               = S.btnSignIn;
    document.getElementById("lbl-back").textContent                = S.backLink;
    document.getElementById("username").placeholder                = S.userPlaceholder;
    document.getElementById("password").placeholder                = S.passPlaceholder;
    document.getElementById("error-msg").textContent               = S.errInvalid;

    // Set active button on load
    document.getElementById("lang-btn-ru").classList.toggle("active", loginLang === "ru");
    document.getElementById("lang-btn-en").classList.toggle("active", loginLang === "en");

    function setLoginLang(lang) {
      localStorage.setItem("ec_admin_lang", lang);
      window.location.reload();
    }

    // ── Auth ────────────────────────────────────────────────────────────────────
    function handleLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errMsg   = document.getElementById("error-msg");
      const passEl   = document.getElementById("password");
      const userEl   = document.getElementById("username");

      errMsg.classList.remove("visible");
      userEl.classList.remove("error");
      passEl.classList.remove("error");

      if (!username || !password) {
        errMsg.textContent = S.errBothRequired;
        errMsg.classList.add("visible");
        if (!username) userEl.classList.add("error");
        if (!password) passEl.classList.add("error");
        return;
      }

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        sessionStorage.setItem("ec_admin_auth", "1");
        sessionStorage.setItem("ec_admin_role", "superadmin");
        window.location.replace("dashboard.html");
      } else if (username === STAFF_USER && password === STAFF_PASS) {
        sessionStorage.setItem("ec_admin_auth", "1");
        sessionStorage.setItem("ec_admin_role", "staff");
        window.location.replace("dashboard.html");
      } else {
        errMsg.textContent = S.errInvalid;
        errMsg.classList.add("visible");
        passEl.classList.add("error");
        passEl.value = "";
        passEl.focus();
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
