<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — E|C Engineering College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../../assets/app_logo.png" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b1f3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-row img { height: 38px; width: auto; }
    .logo-row-text { font-size: 13px; font-weight: 600; color: #0b1f3a; line-height: 1.3; }
    .logo-row-sub { font-size: 11px; color: #6b7a95; font-weight: 400; }
    h1 { font-size: 20px; font-weight: 800; color: #0b1f3a; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7a95; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #0b1f3a; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1.5px solid #dde3ed;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      color: #1a2535;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #1565c0; }
    input.error { border-color: #c0392b; }
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: -14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .btn {
      width: 100%;
      background: #0b1f3a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #122848; }
    .btn:active { background: #0a1a30; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #6b7a95;
      text-decoration: none;
    }
    .back-link:hover { color: #0b1f3a; }
    .divider { height: 1px; background: #dde3ed; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <img src="../../assets/app_logo.png" alt="E|C" onerror="this.style.display='none'" />
      <div>
        <div class="logo-row-text">Engineering College</div>
        <div class="logo-row-sub">Admin Portal</div>
      </div>
    </div>
    <div class="divider"></div>
    <h1>Sign In</h1>
    <p class="subtitle">Access the admin dashboard</p>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    <div class="error-msg" id="error-msg">Incorrect username or password.</div>

    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
    <a class="back-link" href="../../index.html">← Back to Trial Test</a>
  </div>

  <script>
    // Redirect if already authenticated
    if (sessionStorage.getItem("ec_admin_auth") === "1") {
      window.location.replace("dashboard.html");
    }

    const ADMIN_USER = "admin";
    const ADMIN_PASS = "EC@2025";

    function handleLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errMsg   = document.getElementById("error-msg");
      const passEl   = document.getElementById("password");
      const userEl   = document.getElementById("username");

      errMsg.classList.remove("visible");
      userEl.classList.remove("error");
      passEl.classList.remove("error");

      if (!username || !password) {
        errMsg.textContent = "Please enter both username and password.";
        errMsg.classList.add("visible");
        if (!username) userEl.classList.add("error");
        if (!password) passEl.classList.add("error");
        return;
      }

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        sessionStorage.setItem("ec_admin_auth", "1");
        window.location.replace("dashboard.html");
      } else {
        errMsg.textContent = "Incorrect username or password.";
        errMsg.classList.add("visible");
        passEl.classList.add("error");
        passEl.value = "";
        passEl.focus();
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
