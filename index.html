    const QuestionService = {
      build(base, total) {
        const qs = [...base];
        while (qs.length < total) {
          const idx = qs.length;
          const topicKeys = ["topic.algebra", "topic.geometry", "topic.calculus", "topic.statistics", "topic.numberTheory"];
          qs.push({
            topic: TOPIC_NAMES[idx % 5],
            topicKey: topicKeys[idx % 5],
            text: `Question ${idx + 1}: Solve the given mathematical expression.`,
            textRu: `Вопрос ${idx + 1}: Решите данное математическое выражение.`,
            opts: ["Option A", "Option B", "Option C", "Option D"],
            optsRu: ["Вариант A", "Вариант B", "Вариант C", "Вариант D"],
            correct: idx % 4,
          });
        }
        return qs;
      },
    };

    const GradingService = {
      score(answers, questions) {
        let correct = 0;
        questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });
        return correct;
      },
      percentage(correct, total) { return Math.round((correct / total) * 100); },
      grade(pct) { return GRADE_SCALE.find(g => pct >= g.min) || GRADE_SCALE[GRADE_SCALE.length - 1]; },
      topicBreakdown(pct) {
        return [
          { nameKey: "topic.algebra", pct: Math.min(100, pct + 10) },
          { nameKey: "topic.geometry", pct: Math.max(0, pct - 8) },
          { nameKey: "topic.calculus", pct: Math.min(100, pct + 18) },
          { nameKey: "topic.statistics", pct: Math.max(0, pct - 20) },
          { nameKey: "topic.numberTheory", pct: Math.min(100, pct + 5) },
        ];
      },
    };

    const TimeService = {
      format(seconds) {
        return { mm: String(Math.floor(seconds / 60)).padStart(2, "0"), ss: String(seconds % 60).padStart(2, "0") };
      },
      isWarning(seconds) { return seconds < EXAM_CONFIG.warningThresholdSec; },
    };

    const ValidationService = {
      registration(form) {
        const missing = REGISTRATION_FIELDS.filter(f => f.required && !form[f.key]);
        if (missing.length > 0) return { valid: false, missing, reason: "missing" };
        if (!/^\+996\d{9}$/.test(form.phone)) return { valid: false, missing: ["phone"], reason: "phone" };
        return { valid: true, missing: [] };
      },
    };

    function useTimer(duration, onExpire) {
      const [timeLeft, setTimeLeft] = useState(duration);
      const onExpireRef = useRef(onExpire);
      onExpireRef.current = onExpire;
      useEffect(() => {
        const id = setInterval(() => setTimeLeft(t => {
          if (t <= 1) { clearInterval(id); onExpireRef.current(); return 0; }
          return t - 1;
        }), 1000);
        return () => clearInterval(id);
      }, []);
      return { timeLeft, ...TimeService.format(timeLeft), isWarning: TimeService.isWarning(timeLeft) };
    }

    function useExamState(questions) {
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState({});
      const startRef = useRef(Date.now());
      const select = useCallback((i) => setAnswers(a => ({ ...a, [current]: i })), [current]);
      const next = useCallback(() => setCurrent(c => Math.min(questions.length - 1, c + 1)), [questions.length]);
      const prev = useCallback(() => setCurrent(c => Math.max(0, c - 1)), []);
      const goTo = useCallback((i) => setCurrent(i), []);
      const elapsed = useCallback(() => Math.floor((Date.now() - startRef.current) / 1000), []);
      const answeredCount = Object.keys(answers).length;
      const isFirst = current === 0;
      const isLast = current === questions.length - 1;
      return { current, answers, select, next, prev, goTo, elapsed, answeredCount, isFirst, isLast, question: questions[current] };
    }

    function useFormState(fields) {
      const initial = {};
      fields.forEach(f => initial[f.key] = f.initialValue || "");
      const [form, setForm] = useState(initial);
      const set = useCallback((key) => (e) => setForm(f => ({ ...f, [key]: e.target.value })), []);
      return { form, set };
    }

    function usePageNav() {
      const [page, setPage] = useState("landing");
      const [student, setStudent] = useState({});
      const [result, setResult] = useState(null);
      const go = useCallback((p) => setPage(p), []);
      return { page, go, student, setStudent, result, setResult };

    const LangContext = createContext(null);

    function LangProvider({ children }) {
      const [lang, setLang] = useState("ru");

      useEffect(() => {
        document.documentElement.lang = lang;
      }, [lang]);

      const t = useCallback((key, vars = {}) => {
        const val = (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) ||
          (TRANSLATIONS.en && TRANSLATIONS.en[key]) || key;
        if (vars && Object.keys(vars).length > 0) {
          return val.replace(/\{(\w+)\}/g, (_, k) => vars[k] !== undefined ? vars[k] : `{${k}}`);
        }
        return val;
      }, [lang]);

      return (
        <LangContext.Provider value={{ lang, setLang, t }}>
          {children}
        </LangContext.Provider>
      );
    }

    function useLang() { return useContext(LangContext); }

              <input type="checkbox" checked={agreed} onChange={e => setAgreed(e.target.checked)} style={{ width: 16, height: 16, accentColor: COLORS.blue }} />{t("intro.checkbox")}
            </label>
            <button onClick={onStart} disabled={!agreed} style={{ ...Styles.btnPrimary(agreed ? COLORS.success : "#ccc"), cursor: agreed ? "pointer" : "not-allowed", boxShadow: agreed ? "0 6px 20px rgba(27,140,94,.3)" : "none", transition: "all .2s" }}>{t("intro.start")}</button>
          </div>
        </div>
      );
    }

    function Exam({ questions, onFinish }) {
      const { lang, t } = useLang();
      const exam = useExamState(questions);
      const timer = useTimer(EXAM_CONFIG.timeLimitSec, () => submitExam(true));
      const q = exam.question;
      const qText = (lang === "ru" && q.textRu) ? q.textRu : q.text;
      const qOpts = (lang === "ru" && q.optsRu) ? q.optsRu : q.opts;
      const topicLabel = t(q.topicKey || "topic.algebra");

      const submitExam = useCallback((auto = false) => {
        if (!auto && exam.answeredCount < questions.length) {
          const msg = t("exam.confirm", { n: questions.length - exam.answeredCount });
          if (!window.confirm(msg)) return;
        }
        const correct = GradingService.score(exam.answers, questions);
        onFinish({ correct, total: questions.length, elapsed: exam.elapsed() });
      }, [exam.answers, exam.answeredCount, exam.elapsed, questions, onFinish, t]);

      return (
        <div style={{ maxWidth: 1060, margin: "0 auto", padding: "28px 20px", display: "grid", gridTemplateColumns: "1fr 280px", gap: 20, alignItems: "start" }}>
          <div>
            {/* Timer bar */}
            <div style={{ background: COLORS.navy, borderRadius: 8, padding: "14px 22px", marginBottom: 20, boxShadow: "0 4px 20px rgba(0,0,0,.15)" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontFamily: "monospace", fontSize: 12, color: "#8fa3c0" }}>{t("exam.question")} <strong style={{ color: COLORS.white }}>{exam.current + 1}</strong> {t("exam.of")} <strong style={{ color: COLORS.white }}>{questions.length}</strong></div>
                <div style={{ display: "flex", alignItems: "center", gap: 7, fontFamily: "monospace", fontSize: 16, fontWeight: 500, color: timer.isWarning ? "#ff7043" : COLORS.white }}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: timer.isWarning ? "#ff7043" : COLORS.accent, display: "inline-block" }} />{timer.mm}:{timer.ss}
                </div>
              </div>
              <div style={{ height: 4, background: "rgba(255,255,255,.1)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", background: COLORS.accent, borderRadius: 2, width: `${(exam.answeredCount / questions.length) * 100}%`, transition: "width .3s" }} />
              </div>
            </div>
            {/* Question card */}
            <div style={{ ...Styles.card, padding: 28, boxShadow: "0 2px 12px rgba(0,0,0,.04)" }}>
              <div style={{ fontFamily: "monospace", fontSize: 11, color: COLORS.muted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 14 }}>{t("exam.question")} {exam.current + 1} — {topicLabel}</div>
              <div style={{ fontWeight: 700, fontSize: 17, color: COLORS.navy, lineHeight: 1.5, marginBottom: 24 }}>{qText}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {qOpts.map((opt, i) => <OptionCard key={i} letter={LETTERS[i]} text={opt} selected={exam.answers[exam.current] === i} onClick={() => exam.select(i)} />)}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 22 }}>
                <button onClick={exam.prev} disabled={exam.isFirst} style={{ ...Styles.btnOutline, color: exam.isFirst ? COLORS.border : COLORS.text, cursor: exam.isFirst ? "not-allowed" : "pointer" }}>{t("exam.prev")}</button>
                {!exam.isLast
                  ? <button onClick={exam.next} style={Styles.btnPrimary()}>{t("exam.next")}</button>
                  : <button onClick={() => submitExam()} style={Styles.btnPrimary(COLORS.danger)}>{t("exam.submit")}</button>}
              </div>
            </div>
          </div>
          {/* Sidebar */}
          <div>
            <div style={{ ...Styles.card, padding: 18, marginBottom: 14, boxShadow: "none" }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.navy, marginBottom: 12 }}>{t("exam.navigator")}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {questions.map((_, i) => <NavDot key={i} index={i} isCurrent={i === exam.current} isAnswered={exam.answers[i] !== undefined} onClick={() => exam.goTo(i)} />)}
              </div>
              <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 6 }}>
                {[["exam.legend.answered", COLORS.navy], ["exam.legend.current", COLORS.blue], ["exam.legend.unanswered", COLORS.border]].map(([lk, c]) => (
                  <div key={lk} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11, color: COLORS.muted }}><div style={{ width: 12, height: 12, borderRadius: 2, background: c, flexShrink: 0 }} />{t(lk)}</div>))}
              </div>
            </div>
            <div style={{ ...Styles.card, padding: "12px 16px", marginBottom: 14, fontSize: 12, color: COLORS.muted, textAlign: "center", boxShadow: "none" }}>
              <span style={{ fontWeight: 700, color: COLORS.navy, fontSize: 15 }}>{exam.answeredCount}</span> / {questions.length} {t("exam.answered")}
            </div>
            <button onClick={() => submitExam()} style={{ width: "100%", ...Styles.btnPrimary(COLORS.danger), padding: 13 }}>{t("exam.submit")}</button>
          </div>
        </div>
      );
    }

    function Report({ student, result, onHome }) {
      const { t } = useLang();
      const pct = GradingService.percentage(result.correct, result.total);
      const { mm, ss } = TimeService.format(result.elapsed);
      const { labelKey, color: gradeColor } = GradingService.grade(pct);
      const topics = GradingService.topicBreakdown(pct);

      return (
        <div style={{ maxWidth: 820, margin: "0 auto", padding: "48px 20px" }}>
          <Breadcrumb items={[{ text: "college.edu.kg" }, { text: t("register.breadcrumb.exam") }, { text: t("report.breadcrumb.step"), highlight: true, color: COLORS.success }]} />
          {/* Hero */}
          <div style={{ background: `linear-gradient(135deg,${COLORS.navy} 0%,#0a2240 100%)`, borderRadius: 10, padding: "44px 40px", marginBottom: 24, textAlign: "center", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -100, left: "50%", transform: "translateX(-50%)", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle,rgba(27,140,94,.12) 0%,transparent 70%)", pointerEvents: "none" }} />
            <div style={{ fontSize: 36, marginBottom: 12 }}>🎓</div>
            <h2 style={{ fontWeight: 800, fontSize: 26, color: COLORS.white, marginBottom: 6 }}>{t("report.completed")}</h2>
            <p style={{ color: "#8fa3c0", fontSize: 14 }}>{t("report.desc")} <span style={{ color: COLORS.accent, fontWeight: 600 }}>{student.firstName} {student.lastName}</span></p>
            <div style={{ display: "flex", justifyContent: "center", margin: "28px 0 16px" }}><ScoreRing pct={pct} color={gradeColor} /></div>
            <div style={{ display: "inline-block", background: `${gradeColor}22`, color: gradeColor, border: `1px solid ${gradeColor}44`, borderRadius: 3, padding: "4px 14px", fontSize: 12, fontWeight: 700, letterSpacing: 1 }}>{t(labelKey)}</div>
          </div>
          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 24 }}>
            <StatBox value={result.correct} label={t("report.correct")} color={COLORS.success} />
            <StatBox value={result.total - result.correct} label={t("report.incorrect")} color={COLORS.danger} />
            <StatBox value={result.total} label={t("report.total")} color={COLORS.navy} />
            <StatBox value={`${mm}:${ss}`} label={t("report.timeused")} color={COLORS.blue} />
          </div>
          {/* Topics */}
          <div style={{ ...Styles.card, marginBottom: 24, overflow: "hidden", boxShadow: "none" }}>
            <div style={{ padding: "14px 22px", background: "#f7f9fc", borderBottom: `1px solid ${COLORS.border}`, fontWeight: 700, fontSize: 13, color: COLORS.navy, display: "flex", justifyContent: "space-between" }}>
              <span>{t("report.topics")}</span><span style={{ fontSize: 11, fontWeight: 400, color: COLORS.muted }}>{t("report.estimated")}</span>
            </div>
            {topics.map(tp => <TopicBar key={tp.nameKey} nameKey={tp.nameKey} pct={tp.pct} />)}
          </div>
          {/* Actions */}
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <a href="https://college.edu.kg/" target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "12px 24px", borderRadius: 4, background: COLORS.navy, color: COLORS.white, fontWeight: 700, fontSize: 13, textDecoration: "none" }}>{t("report.visit")}</a>
            <button onClick={onHome} style={{ ...Styles.btnOutline, display: "inline-flex", alignItems: "center", gap: 8, color: COLORS.text, fontWeight: 600 }}>{t("report.home")}</button>
            <button onClick={() => window.print()} style={{ ...Styles.btnOutline, display: "inline-flex", alignItems: "center", gap: 8, color: COLORS.text, fontWeight: 600 }}>{t("report.print")}</button>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       APP — Orchestrator (DIP — depends on abstractions)
       ═══════════════════════════════════════════════════════════ */

    const QUESTIONS = QuestionService.build(BASE_QUESTIONS, EXAM_CONFIG.totalQuestions);

    function App() {
      const nav = usePageNav();
      const handleRegister = (form) => { nav.setStudent(form); nav.go("intro"); };
      const handleFinish = (res) => { nav.setResult(res); nav.go("report"); };

      return (
        <LangProvider>
          <div style={Styles.page}>
            <Header page={nav.page} onLogoClick={() => nav.go("landing")} />
            {nav.page === "landing" && <Landing onStart={() => nav.go("register")} />}
            {nav.page === "register" && <Register onSubmit={handleRegister} onBack={() => nav.go("landing")} />}
            {nav.page === "intro" && <Instructions student={nav.student} onStart={() => nav.go("exam")} />}
            {nav.page === "exam" && <Exam questions={QUESTIONS} onFinish={handleFinish} />}
            {nav.page === "report" && <Report student={nav.student} result={nav.result} onHome={() => nav.go("landing")} />}
          </div>
        </LangProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
